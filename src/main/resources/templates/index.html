<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Event Management System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎓 College Event Management System</h1>
            <p>Welcome to NIT Event Registration Portal</p>
        </div>
        
        <div class="login-options">
            <div class="card">
                <div class="icon">👨‍💼</div>
                <h2>Admin Login</h2>
                <p>Manage events and registrations</p>
                <a href="/admin/login" class="btn btn-primary">Admin Portal</a>
            </div>
            
            <div class="card">
                <div class="icon">👨‍🎓</div>
                <h2>Student Portal</h2>
                <p>Register for college events</p>
                <a href="/student/login" class="btn btn-success">Student Login</a>
                <a href="/student/register" class="btn btn-outline">New Student? Register</a>
            </div>
        </div>
        
        <div class="footer">
            <p>&copy; 2026 NIT College Event Management System</p>
        </div>
    </div>
</body>
</html>
