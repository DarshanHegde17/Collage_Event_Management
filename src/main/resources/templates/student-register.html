<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration - College Event Management</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <div class="register-box">
            <h1>📝 Student Registration</h1>
            <p class="subtitle">Create Your Account</p>
            
            <form id="studentRegisterForm">
                <div class="form-row">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="name" name="name" placeholder="Enter full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Roll Number *</label>
                        <input type="text" id="rollNumber" name="rollNumber" placeholder="Enter roll number" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" id="email" name="email" placeholder="Enter email" required>
                    </div>
                    
                    <div class="form-group">
                        <label>Department *</label>
                        <select id="department" name="department" required>
                            <option value="">Select Department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Electronics">Electronics</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Civil">Civil</option>
                            <option value="Electrical">Electrical</option>
                            <option value="Chemical">Chemical</option>
                        </select>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Year *</label>
                        <select id="year" name="year" required>
                            <option value="">Select Year</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Username *</label>
                        <input type="text" id="username" name="username" placeholder="Choose username" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Password *</label>
                    <input type="password" id="password" name="password" placeholder="Choose password" required>
                </div>
                
                <div id="message" class="message"></div>
                
                <button type="submit" class="btn btn-success btn-block">Register</button>
                <a href="/student/login" class="btn btn-outline btn-block">Already have an account? Login</a>
                <a href="/" class="btn btn-outline btn-block">Back to Home</a>
            </form>
        </div>
    </div>
    
    <script>
        document.getElementById('studentRegisterForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = {
                name: document.getElementById('name').value,
                rollNumber: document.getElementById('rollNumber').value,
                email: document.getElementById('email').value,
                department: document.getElementById('department').value,
                year: document.getElementById('year').value,
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };
            
            const messageDiv = document.getElementById('message');
            
            try {
                const response = await fetch('/student/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = data.message;
                    setTimeout(() => {
                        window.location.href = '/student/login';
                    }, 2000);
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message;
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Registration failed. Please try again.';
            }
        });
    </script>
</body>
</html>
